<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flipkart</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
</head>

<body>
    <header>
        
        <nav class="top-nav">
            <div class="top-nav-left">
                <button id="flip" class="button1">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span>Flipkart</span>
                </button>

                <button id="travel" class="button1">
                    <i class="fa-solid fa-plane"></i>
                    Travel
                </button>
            </div>

            <div class="top-nav-right">
                <button id="location" class="button1">
                    <i class="fa-solid fa-location-crosshairs"></i>
                    Vadodara
                </button>
            </div>
        </nav>

        <nav class="search-nav">
            <!-- <div class="logo">
                Flipkart
            </div> -->

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search for Products, Brands and More" />
            </div>

            <div class="nav-links">
                <button class="nav-btn">
                    <i class="fa-solid fa-user"></i>
                    Login
                </button>

                <button class="nav-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    Cart
                </button>
            </div>
        </nav>

        <nav class="category-nav">
            <div class="icon-box">
                <div><i class="fa-solid fa-mobile"></i></div>
                <span>Mobile</span>
            </div>
            <div class="icon-box">b2</div>
            <div class="icon-box">b3</div>
            <div class="icon-box">b4</div>
            <div class="icon-box">b3</div>
            <div class="icon-box">b3</div>
            <div class="icon-box">b3</div>
            <div class="icon-box">b3</div>
            <div class="icon-box">b3</div>
            <div class="icon-box">b3</div>
            <div class="icon-box">b3</div>
            <div class="icon-box">b3</div>
            <div class="icon-box">b3</div>
        </nav>

    </header>

    <main>
        
    </main>

    <footer>
        
    </footer>

</body>
</html>
